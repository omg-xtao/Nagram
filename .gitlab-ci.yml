stages:
  - prepare
  - probe
  - native-build
  - build
  - upload

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "m_pg"
      changes:
        - "**/*"
        - "!**/*.md"
        - "!.github/**/*"
        - ".gitlab-ci.yml"
    - if: $CI_PIPELINE_SOURCE == "web"

default:
  image: alpine:3.20
  tags:
    - saas-linux-medium-amd64
  before_script:
    - export ANDROID_HOME="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
    - echo "sdk.dir=${ANDROID_HOME}" > local.properties
    - echo "ndk.dir=${ANDROID_HOME}/ndk/27.2.12479018" >> local.properties

.fetch-status: &fetch-status |
  sed -i -E 's#https://github\.com/[^/]+/#https://gitlab.com/xtao-labs/#g' .gitmodules
  git submodule sync
  git submodule update --init --force 'TMessagesProj/jni/*'

  git submodule status TMessagesProj/jni/ffmpeg > ffmpeg_status
  git submodule status TMessagesProj/jni/libvpx >> ffmpeg_status
  cat TMessagesProj/jni/*ffmpeg*.sh >> ffmpeg_status
  cat TMessagesProj/jni/*libvpx*.sh >> ffmpeg_status
  cat TMessagesProj/jni/patches/ffmpeg/* >> ffmpeg_status
  cp ffmpeg_status libvpx_status

  git submodule status TMessagesProj/jni/boringssl > boringssl_status
  cat TMessagesProj/jni/*boringssl*.sh >> boringssl_status
  cat TMessagesProj/jni/patches/boringssl/* >> boringssl_status

  find TMessagesProj/jni/ -maxdepth 2 -type f -exec cat {} + > native_status 2>/dev/null
  cat ffmpeg_status boringssl_status >> native_status

  cat gradle/wrapper/gradle-wrapper.properties > gradle_status

fingerprint:
  stage: prepare
  tags:
    - saas-linux-small-amd64
  before_script:
    - apk add --no-cache git bash coreutils
  script:
    - *fetch-status
    - export FFMPEG_KEY=$(sha256sum ffmpeg_status | cut -d' ' -f1)
    - export LIBVPX_KEY=$(sha256sum libvpx_status | cut -d' ' -f1)
    - export BORINGSSL_KEY=$(sha256sum boringssl_status | cut -d' ' -f1)
    - export NATIVE_KEY=$(sha256sum native_status | cut -d' ' -f1)
    - export GRADLE_KEY=$(sha256sum gradle_status | cut -d' ' -f1)
    - echo "FFMPEG_KEY=${FFMPEG_KEY}" >> fingerprint.env
    - echo "LIBVPX_KEY=${LIBVPX_KEY}" >> fingerprint.env
    - echo "BORINGSSL_KEY=${BORINGSSL_KEY}" >> fingerprint.env
    - echo "NATIVE_KEY=${NATIVE_KEY}" >> fingerprint.env
    - echo "GRADLE_KEY=${GRADLE_KEY}" >> fingerprint.env
    - cat fingerprint.env
  artifacts:
    reports:
      dotenv: fingerprint.env
    expire_in: 1 day

cache-probe:
  stage: probe
  tags:
    - saas-linux-small-amd64
  before_script:
    - apk add --no-cache bash coreutils
  needs:
    - job: fingerprint
      artifacts: true
  cache:
    - key: "ffmpeg-libvpx-${FFMPEG_KEY}-${LIBVPX_KEY}"
      paths:
        - TMessagesProj/jni/ffmpeg/build/
        - TMessagesProj/jni/libvpx/build/
      policy: pull
    - key: "boringssl-${BORINGSSL_KEY}"
      paths:
        - TMessagesProj/jni/boringssl/build/
      policy: pull
    - key: "native-armeabi-v7a-${NATIVE_KEY}"
      paths:
        - TMessagesProj/src/main/libs/armeabi-v7a/
      policy: pull
    - key: "native-arm64-v8a-${NATIVE_KEY}"
      paths:
        - TMessagesProj/src/main/libs/arm64-v8a/
      policy: pull
  script:
    - bash bin/scripts/gen-native-pipeline.sh > native-pipeline.yml
    - cat native-pipeline.yml
  artifacts:
    paths:
      - native-pipeline.yml
    expire_in: 1 day

native-pipeline:
  stage: native-build
  needs:
    - job: fingerprint
      artifacts: true
    - job: cache-probe
      artifacts: true
  variables:
    PARENT_FFMPEG_KEY: "${FFMPEG_KEY}"
    PARENT_LIBVPX_KEY: "${LIBVPX_KEY}"
    PARENT_BORINGSSL_KEY: "${BORINGSSL_KEY}"
    PARENT_NATIVE_KEY: "${NATIVE_KEY}"
  trigger:
    include:
      - artifact: native-pipeline.yml
        job: cache-probe
    strategy: depend

build:
  stage: build
  image: registry.gitlab.com/xtao-labs/android-ndk:35-jdk17.0.18_8-ndk27.2.12479018-cmake3.22.1-ci
  needs:
    - job: fingerprint
      artifacts: true
    - job: cache-probe
      artifacts: true
    - job: native-pipeline
  cache:
    - key: "gradle-${GRADLE_KEY}"
      paths:
        - .gradle-cache/
    - key: "native-armeabi-v7a-${NATIVE_KEY}"
      paths:
        - TMessagesProj/src/main/libs/armeabi-v7a/
      policy: pull
    - key: "native-arm64-v8a-${NATIVE_KEY}"
      paths:
        - TMessagesProj/src/main/libs/arm64-v8a/
      policy: pull
  script:
    - sed -i "s/2000000000000/$(date +%s%3N)/g" gradle.properties
    - export GRADLE_USER_HOME="$CI_PROJECT_DIR/.gradle-cache"
    - export LOCAL_PROPERTIES="${LOCAL_PROPERTIES}"
    - ./gradlew TMessagesProj:assembleRelease --build-cache --no-configuration-cache
    - APK=$(find TMessagesProj/build/outputs/apk -name '*arm64-v8a*.apk')
    - APK_DIR=$(dirname "$APK")
    - mkdir -p artifacts/Release
    - cp -r "$APK_DIR"/* artifacts/Release/
    - cp gradle.properties artifacts/gradle.properties
  artifacts:
    name: "Release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - artifacts/Release/
      - artifacts/gradle.properties
    expire_in: 1 week

upload:
  stage: upload
  image: python:3.12-slim
  tags:
    - saas-linux-small-amd64
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
  needs:
    - job: build
      artifacts: true
  script:
    - cp artifacts/gradle.properties gradle.properties
    - export mini64=$(find artifacts -name "*arm64-v8a.apk")
    - export mini32=$(find artifacts -name "*armeabi-v7a.apk")
    - echo $mini64
    - echo $mini32
    - pip install --no-cache-dir -r bin/scripts/requirements.txt
    - git log -1 --pretty=format:"%s%n%n%b" > artifacts/caption.txt
    - python bin/scripts/upload.py "${HELPER_BOT_TOKEN}" "${HELPER_BOT_TARGET}" test
